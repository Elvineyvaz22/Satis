# LəçinSatış - Nginx Konfiqurasiyası
# Bu faylı /etc/nginx/sites-available/lacinsatis kopyalayın

server {
    listen 80;
    server_name lacinsatis.example.com;  # Öz domaininizi yazın

    # Admin və index HTML faylları
    location / {
        root /var/www/lacinsatis;
        index index.html admin.html;
        try_files $uri $uri/ =404;
    }

    # API sorğularını backend-ə yönləndir
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # QR kod şəkilləri üçün (əgər fayl kimi saxlanılsa)
    location /qrcodes/ {
        alias /var/www/lacinsatis/qrcodes/;
    }
}

